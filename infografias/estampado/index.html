<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa interactivo embebible | Concreto Estampado</title>
  <style>
    :root { --bg:#f6f6f3; --panel:rgba(255,255,255,.94); --accent:#f6ae22; --text:#252525; --muted:#6b6b6b; --ring:rgba(255,190,54,.32); }
    * { box-sizing:border-box; }
    html, body { height:100%; margin:0; background:var(--bg); font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--text); }
    body { overflow:hidden; }
    .app { width:100vw; height:100vh; display:grid; grid-template-rows:auto 1fr; }
    header { position:relative; z-index:10; display:flex; gap:12px; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--panel); box-shadow:0 2px 20px rgba(0,0,0,.08); }
    .brand { min-width:0; line-height:1.15; }
    .brand strong { display:block; font-size:clamp(14px,2vw,17px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .brand span { font-size:12px; color:var(--muted); }
    .toolbar { display:flex; gap:8px; align-items:center; }
    button { border:0; border-radius:999px; padding:9px 12px; font-weight:700; cursor:pointer; background:#fff; color:var(--text); box-shadow:0 2px 12px rgba(0,0,0,.12); }
    button:hover { background:#fff7e5; }
    .zoom-readout { font-size:12px; min-width:46px; text-align:center; color:var(--muted); }
    .stage { position:relative; overflow:hidden; touch-action:none; cursor:grab; }
    .stage.dragging { cursor:grabbing; }
    .world { position:absolute; left:0; top:0; transform-origin:0 0; }
    .map-wrap { position:relative; width:2048px; height:1489px; }
    .map-img { position:absolute; inset:0; width:2048px; height:1489px; user-select:none; pointer-events:none; display:block; }
    svg.hotspots { position:absolute; inset:0; width:2048px; height:1489px; overflow:visible; }
    .hotspot { fill:transparent; stroke:transparent; stroke-width:3; cursor:pointer; pointer-events:all; transition:fill .16s ease, stroke .16s ease; }
    .hotspot:hover, .hotspot:focus-visible { fill:var(--ring); stroke:rgba(255,255,255,.85); outline:none; }
    .hint { position:absolute; left:14px; bottom:14px; z-index:10; background:var(--panel); border-radius:16px; padding:10px 12px; box-shadow:0 8px 28px rgba(0,0,0,.16); font-size:13px; color:var(--muted); max-width:min(92vw,560px); }
    .tooltip, .toast { position:fixed; z-index:30; background:#1f1f1f; color:#fff; border-radius:12px; font-size:13px; box-shadow:0 8px 25px rgba(0,0,0,.22); }
    .tooltip { pointer-events:none; transform:translate(-50%,calc(-100% - 14px)); padding:8px 10px; opacity:0; transition:opacity .12s ease; white-space:nowrap; }
    .tooltip.show { opacity:1; }
    .toast { left:50%; bottom:24px; transform:translateX(-50%); border-radius:999px; padding:10px 14px; opacity:0; pointer-events:none; transition:opacity .18s ease,bottom .18s ease; }
    .toast.show { opacity:1; bottom:34px; }
    .modal { position:fixed; inset:0; z-index:40; display:none; place-items:center; padding:10px; background:rgba(10,10,10,.82); backdrop-filter:blur(10px); }
    .modal.open { display:grid; }
    .dialog { width:min(1600px,99vw); height:min(960px,96vh); display:grid; grid-template-rows:auto minmax(0,1fr) auto auto; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 30px 90px rgba(0,0,0,.42); }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 12px; border-bottom:1px solid rgba(0,0,0,.08); }
    .title { min-width:0; font-size:16px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .close { min-width:38px; height:38px; padding:0; font-size:24px; line-height:1; }
    .gallery-body { position:relative; min-height:360px; background:#111; display:grid; place-items:center; }
    .gallery-image { width:100%; height:100%; max-height:calc(96vh - 142px); aspect-ratio:16/9; object-fit:contain; display:block; background:#111; }
    .gallery-empty { padding:32px; color:#fff; text-align:center; font-weight:700; }
    .gallery-nav { position:absolute; top:50%; transform:translateY(-50%); width:54px; height:54px; padding:0; display:grid; place-items:center; background:rgba(255,255,255,.9); font-size:34px; }
    .gallery-prev { left:16px; }
    .gallery-next { right:16px; }
    .caption { min-height:38px; padding:8px 12px; color:#444; font-size:14px; border-top:1px solid rgba(0,0,0,.08); }
    .thumbs { display:flex; gap:8px; padding:8px 12px 10px; overflow-x:auto; background:#fff; }
    .thumb { flex:0 0 92px; width:92px; height:52px; padding:0; border-radius:6px; overflow:hidden; border:3px solid transparent; box-shadow:none; background:#eee; }
    .thumb.active { border-color:var(--accent); }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .secondary { background:#f2f2f2; }
    .primary { background:var(--accent); }
    @media (max-width:640px) {
      header { align-items:flex-start; padding:10px; }
      .brand span, .zoom-readout { display:none; }
      button { padding:8px 10px; }
      .hint { font-size:12px; left:10px; right:10px; bottom:10px; }
      .modal { padding:6px; }
      .dialog { width:100%; height:97vh; border-radius:10px; }
      .gallery-image { max-height:calc(97vh - 150px); aspect-ratio:16/9; }
      .gallery-nav { width:44px; height:44px; font-size:28px; }
      .gallery-prev { left:8px; }
      .gallery-next { right:8px; }
      .thumb { flex-basis:74px; width:74px; height:42px; }
    }
  </style>  <link rel="icon" href="../../assets/favicon.png" type="image/png" />

    const IMG_W = 2048, IMG_H = 1489, CX = 1024, CY = 744, INNER_R = 484, OUTER_R = 728;
    const stage = document.getElementById('stage'), world = document.getElementById('world'), svg = document.getElementById('hotspots');
    const tooltip = document.getElementById('tooltip'), toast = document.getElementById('toast'), zoomReadout = document.getElementById('zoomReadout');
    const galleryModal = document.getElementById('galleryModal'), galleryTitle = document.getElementById('galleryTitle'), galleryClose = document.getElementById('galleryClose');
    const galleryPrev = document.getElementById('galleryPrev'), galleryNext = document.getElementById('galleryNext'), galleryImage = document.getElementById('galleryImage');
    const galleryEmpty = document.getElementById('galleryEmpty'), galleryCaption = document.getElementById('galleryCaption'), galleryThumbs = document.getElementById('galleryThumbs');

    let view = { x:0, y:0, scale:1 }, pointers = new Map(), dragStart = null, didDrag = false, lastTapDistance = null;
    let galerias = cleanGalerias(DEFAULT_GALERIAS), activeGallery = { label:'', images:[], index:0 };

    function cleanGalerias(data) {
      const output = {};
      Object.entries(data || {}).forEach(([id, images]) => {
        if (!Array.isArray(images)) return;
        output[id] = images
          .map(image => typeof image === 'string' ? { src:image, caption:'' } : image)
          .filter(image => image && image.src)
          .map(image => ({ src:String(image.src).trim(), caption:String(image.caption || '').trim() }))
          .filter(image => image.src);
      });
      return output;
    }
    function polar(cx, cy, r, angleDeg) {
      const a = (angleDeg - 90) * Math.PI / 180;
      return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    }
    function sectorPath(start, end) {
      const large = end - start > 180 ? 1 : 0;
      const [x1,y1] = polar(CX,CY,OUTER_R,start), [x2,y2] = polar(CX,CY,OUTER_R,end);
      const [x3,y3] = polar(CX,CY,INNER_R,end), [x4,y4] = polar(CX,CY,INNER_R,start);
      return `M ${x1} ${y1} A ${OUTER_R} ${OUTER_R} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${INNER_R} ${INNER_R} 0 ${large} 0 ${x4} ${y4} Z`;
    }
    function getGalleryImages(id) {
      return (galerias[id] || []).filter(image => image && image.src);
    }
    function renderHotspots() {
      svg.innerHTML = '';
      HOTSPOTS.forEach(item => {
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', sectorPath(item.start, item.end));
        p.setAttribute('class', 'hotspot');
        p.setAttribute('tabindex', '0');
        p.setAttribute('role', 'button');
        p.setAttribute('aria-label', item.label);
        p.dataset.id = item.id;
        p.dataset.label = item.label;
        p.addEventListener('pointerdown', ev => {
          ev.stopPropagation();
          didDrag = false;
        });
        p.addEventListener('pointerenter', showTip);
        p.addEventListener('pointermove', moveTip);
        p.addEventListener('pointerleave', hideTip);
        p.addEventListener('click', ev => { ev.stopPropagation(); if (!didDrag) openHotspot(item); });
        p.addEventListener('keydown', ev => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); openHotspot(item); } });
        svg.appendChild(p);
      });
    }
    function openHotspot(item) {
      const images = getGalleryImages(item.id);
      if (!images.length) { showToast(`Sin imágenes: ${item.label}. Agrega URLs en DEFAULT_GALERIAS.`); return; }
      openGallery(item.id, item.label, images);
    }
    function openGallery(id, label, images, startIndex = 0) {
      activeGallery = { id, label, images, index:startIndex };
      galleryTitle.textContent = label;
      galleryModal.classList.add('open');
      galleryModal.setAttribute('aria-hidden', 'false');
      renderGallery();
      galleryClose.focus();
    }
    function closeGallery() {
      galleryModal.classList.remove('open');
      galleryModal.setAttribute('aria-hidden', 'true');
      galleryImage.removeAttribute('src');
    }
    function setGalleryIndex(index) {
      const total = activeGallery.images.length;
      if (!total) return;
      activeGallery.index = (index + total) % total;
      renderGallery();
    }
    function renderGallery() {
      const { images, index, label } = activeGallery;
      const current = images[index];
      galleryImage.style.display = current ? 'block' : 'none';
      galleryEmpty.style.display = current ? 'none' : 'block';
      galleryPrev.style.display = images.length > 1 ? 'grid' : 'none';
      galleryNext.style.display = images.length > 1 ? 'grid' : 'none';
      galleryCaption.textContent = current ? (current.caption || `${label} · ${index + 1} de ${images.length}`) : '';
      galleryThumbs.innerHTML = '';
      if (!current) return;
      galleryImage.src = current.src;
      galleryImage.alt = current.caption || label;
      images.forEach((image, imageIndex) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'thumb' + (imageIndex === index ? ' active' : '');
        btn.setAttribute('aria-label', `Ver imagen ${imageIndex + 1}`);
        btn.addEventListener('click', () => setGalleryIndex(imageIndex));
        const thumb = document.createElement('img');
        thumb.src = image.src;
        thumb.alt = '';
        btn.appendChild(thumb);
        galleryThumbs.appendChild(btn);
      });
    }
    function showTip(ev) {
      const count = getGalleryImages(ev.currentTarget.dataset.id).length;
      tooltip.textContent = `${ev.currentTarget.dataset.label} · ${count ? count + ' imágenes' : 'sin imágenes'}`;
      tooltip.classList.add('show');
      moveTip(ev);
    }
    function moveTip(ev) { tooltip.style.left = ev.clientX + 'px'; tooltip.style.top = ev.clientY + 'px'; }
    function hideTip() { tooltip.classList.remove('show'); }
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast.t);
      showToast.t = setTimeout(() => toast.classList.remove('show'), 2200);
    }
    function applyTransform() {
      world.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
      zoomReadout.textContent = Math.round(view.scale * 100) + '%';
    }
    function clampView() {
      const sw = stage.clientWidth, sh = stage.clientHeight, w = IMG_W * view.scale, h = IMG_H * view.scale, margin = 80;
      view.x = w <= sw ? (sw - w) / 2 : Math.min(margin, Math.max(sw - w - margin, view.x));
      view.y = h <= sh ? (sh - h) / 2 : Math.min(margin, Math.max(sh - h - margin, view.y));
    }
    function fitToScreen() {
      view.scale = Math.max(0.18, Math.min(stage.clientWidth / IMG_W, stage.clientHeight / IMG_H) * 0.96);
      view.x = (stage.clientWidth - IMG_W * view.scale) / 2;
      view.y = (stage.clientHeight - IMG_H * view.scale) / 2;
      applyTransform();
    }
    function zoomAt(clientX, clientY, factor) {
      const old = view.scale, next = Math.min(4, Math.max(0.18, old * factor));
      const wx = (clientX - view.x) / old, wy = (clientY - view.y) / old;
      view.scale = next;
      view.x = clientX - wx * next;
      view.y = clientY - wy * next;
      clampView();
      applyTransform();
    }
    stage.addEventListener('wheel', ev => { ev.preventDefault(); zoomAt(ev.clientX, ev.clientY, ev.deltaY < 0 ? 1.12 : 0.89); }, { passive:false });
    stage.addEventListener('pointerdown', ev => {
      if (ev.target.classList && ev.target.classList.contains('hotspot')) return;
      stage.setPointerCapture(ev.pointerId);
      pointers.set(ev.pointerId, { x:ev.clientX, y:ev.clientY });
      didDrag = false;
      if (pointers.size === 1) { dragStart = { x:ev.clientX, y:ev.clientY, vx:view.x, vy:view.y }; lastTapDistance = null; stage.classList.add('dragging'); }
      if (pointers.size === 2) {
        const pts = [...pointers.values()];
        lastTapDistance = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
      }
    });
    stage.addEventListener('pointermove', ev => {
      if (!pointers.has(ev.pointerId)) return;
      pointers.set(ev.pointerId, { x:ev.clientX, y:ev.clientY });
      if (pointers.size === 2) {
        const pts = [...pointers.values()], d = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        if (lastTapDistance) zoomAt((pts[0].x + pts[1].x) / 2, (pts[0].y + pts[1].y) / 2, d / lastTapDistance);
        lastTapDistance = d;
        didDrag = true;
        return;
      }
      if (!dragStart) return;
      const dx = ev.clientX - dragStart.x, dy = ev.clientY - dragStart.y;
      if (Math.abs(dx) + Math.abs(dy) > 5) didDrag = true;
      view.x = dragStart.vx + dx;
      view.y = dragStart.vy + dy;
      clampView();
      applyTransform();
    });
    function endPointer(ev) {
      pointers.delete(ev.pointerId);
      stage.classList.remove('dragging');
      dragStart = null;
      lastTapDistance = null;
      setTimeout(() => { didDrag = false; }, 0);
    }
    stage.addEventListener('pointerup', endPointer);
    stage.addEventListener('pointercancel', endPointer);
    document.getElementById('zoomIn').addEventListener('click', () => zoomAt(stage.clientWidth / 2, stage.clientHeight / 2, 1.22));
    document.getElementById('zoomOut').addEventListener('click', () => zoomAt(stage.clientWidth / 2, stage.clientHeight / 2, 0.82));
    document.getElementById('resetView').addEventListener('click', fitToScreen);
    galleryClose.addEventListener('click', closeGallery);
    galleryPrev.addEventListener('click', () => setGalleryIndex(activeGallery.index - 1));
    galleryNext.addEventListener('click', () => setGalleryIndex(activeGallery.index + 1));
    galleryModal.addEventListener('click', ev => { if (ev.target === galleryModal) closeGallery(); });
    document.addEventListener('keydown', ev => {
      if (galleryModal.classList.contains('open')) {
        if (ev.key === 'Escape') closeGallery();
        if (ev.key === 'ArrowLeft') setGalleryIndex(activeGallery.index - 1);
        if (ev.key === 'ArrowRight') setGalleryIndex(activeGallery.index + 1);
      }
    });
    window.addEventListener('resize', () => { clampView(); applyTransform(); });
    renderHotspots();
    fitToScreen();
  </script>
</body>
</html>
